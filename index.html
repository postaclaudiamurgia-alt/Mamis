function getDistance(lat1,lon1,lat2,lon2){
  const R=6371e3,φ1=lat1*Math.PI/180,φ2=lat2*Math.PI/180;
  const Δφ=(lat2-lat1)*Math.PI/180,Δλ=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function AgendaScreen({events,setEvents,groups,setScreen}){
  const now=useClock();
  const [showModal,setShowModal]=useState(false);
  const [filter,setFilter]=useState("tutti");
  const [selDay,setSelDay]=useState(now.getDate());
  const [form,setForm]=useState({title:"",time:"",type:"lavoro",date:todayStr});

  const yr=now.getFullYear(),mo=now.getMonth(),todayN=now.getDate();
  const firstDay=(new Date(yr,mo,1).getDay()+6)%7;
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const calDays=[...Array(firstDay).fill(null),...Array.from({length:daysInMo},(_,i)=>i+1)];
  const fmt=d=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evOnDay=d=>events.filter(e=>e.date===fmt(d));
  const filtered=events.filter(e=>e.date===fmt(selDay)&&(filter==="tutti"||e.type===filter));

  const addEvent=()=>{
    if(!form.title.trim()||!form.time.trim())return;
    const t=TYPE_MAP[form.type]||TYPE_MAP.altro;
    setEvents(p=>[...p,{id:uid(),...form,icon:t.icon,color:t.color}]);
    setForm({title:"",time:"",type:"lavoro",date:fmt(selDay)});
    setShowModal(false);
  };

  const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  return(
    <div className="fade-up">
      {/* Live clock */}
      <div style={{...L.card,background:C.text,border:"none",padding:"18px 22px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:500,color:"rgba(255,255,255,0.5)",letterSpacing:2,textTransform:"uppercase"}}>{DAYS[now.getDay()]} {now.getDate()} {MONTHS[now.getMonth()]} {yr}</div>
        <div style={{fontSize:36,fontWeight:300,color:C.white,letterSpacing:2,marginTop:4}}>{timeStr}</div>
      </div>

      {/* Calendar */}
      <div style={{...L.cardWarm,padding:"18px 16px"}}>
        <div style={{fontSize:13,fontWeight:500,color:C.text,textAlign:"center",marginBottom:14}}>{MONTHS[mo]} {yr}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:8}}>
          {DAYS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:C.textLight,fontWeight:500,letterSpacing:0.5}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {calDays.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const isT=d===todayN,isSel=d===selDay,hasEv=evOnDay(d).length>0;
            return(
              <div key={i} onClick={()=>setSelDay(d)} style={{
                textAlign:"center",padding:"7px 2px",borderRadius:10,cursor:"pointer",
                background:isSel?C.red:isT?"rgba(232,99,106,0.12)":"transparent",
                color:isSel?C.white:isT?C.red:C.text,
                fontWeight:isSel||isT?500:400,fontSize:13,transition:"all 0.15s",
              }}>
                {d}
                {hasEv&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.7)":C.red,margin:"2px auto 0"}}/>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {[["tutti","Tutti"],["lavoro","Lavoro"],["scuola","Scuola"],["figlio","Figli"],["festa","Feste"],["salute","Salute"]].map(([k,l])=>(
          <div key={k} onClick={()=>setFilter(k)} style={{...L.pill,cursor:"pointer",background:filter===k?C.text:C.stone,color:filter===k?C.white:C.textMid,transition:"all 0.15s"}}>{l}</div>
        ))}
      </div>

      <div style={L.secLabel}>{selDay} {MONTHS[mo]} — {filtered.length} impegni</div>
      {filtered.length===0&&<div style={{...L.cardWarm,textAlign:"center",padding:22,color:C.textMid,fontSize:14}}>Nessun impegno. Tocca + per aggiungere.</div>}
      {filtered.map(e=>{
        const t=TYPE_MAP[e.type]||TYPE_MAP.altro;
        const linkedGroup=groups?.find(g=>g.linkedEvent?.id===e.id);
        return(
          <div key={e.id} style={{...L.card,padding:"14px 16px"}} className="fade-up">
            <div style={L.row}>
              <div style={{width:36,height:36,borderRadius:"50%",background:t.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>{t.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:C.text}}>{e.title}</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>⏰ {e.time}</div>
                {linkedGroup&&(
                  <div onClick={()=>setScreen&&setScreen("social")} style={{...L.row,gap:6,marginTop:6,cursor:"pointer"}}>
                    <div style={{fontSize:14}}>{linkedGroup.emoji}</div>
                    <div style={{fontSize:12,color:C.red,fontWeight:500,textDecoration:"underline"}}>{linkedGroup.name}</div>
                  </div>
                )}
              </div>
              <button onClick={()=>setEvents(p=>p.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:C.textLight,fontSize:18,cursor:"pointer",padding:4}}>×</button>
            </div>
          </div>
        );
      })}
      <button onClick={()=>{setForm({...form,date:fmt(selDay)});setShowModal(true);}} style={{...L.btn,width:"100%",marginTop:8}}>
        + Aggiungi impegno
      </button>

      {showModal&&(
        <Modal onClose={()=>setShowModal(false)} title="Nuovo impegno">
          <input style={L.input} placeholder="Titolo..." value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
          <input style={L.input} placeholder="Orario es. 15:30" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
          <input style={{...L.input}} type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
          <select style={{...L.input,marginBottom:14}} value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
            {Object.entries(TYPE_MAP).map(([k,v])=><option key={k} value={k}>{v.icon} {k.charAt(0).toUpperCase()+k.slice(1)}</option>)}
          </select>
          <div style={{display:"flex",gap:10}}>
            <button onClick={addEvent} style={{...L.btn,flex:1}}>Salva</button>
            <button onClick={()=>setShowModal(false)} style={{...L.btnOut,flex:1}}>Annulla</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

              {commentId===p.id&&(
                <div style={{...L.row,marginTop:10}}>
                  <input style={{...L.input,flex:1,marginBottom:0,fontSize:13,padding:"9px 13px"}} placeholder="Commenta..." value={commentText} onChange={e=>setCommentText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendComment(p.id)}/>
                  <button onClick={()=>sendComment(p.id)} style={{...L.btn,padding:"9px 14px",marginLeft:8,fontSize:13}}>↩</button>
                </div>
              )}
            </div>
          ))}
          {showPost&&(
            <Modal onClose={()=>setShowPost(false)} title="Nuovo post">
              <textarea style={{...L.input,height:110,resize:"none"}} placeholder="Cosa vuoi condividere?" value={newPost.text} onChange={e=>setNewPost({...newPost,text:e.target.value})}/>
              <select style={L.input} value={newPost.tag} onChange={e=>setNewPost({...newPost,tag:e.target.value})}>
                {["Generale","Aiuto","Cuore","Consiglio","Lavoro","Scuola","Ricetta"].map(t=><option key={t}>{t}</option>)}
              </select>
              <div style={{display:"flex",gap:10}}>
                <button onClick={publishPost} style={{...L.btn,flex:1}}>Pubblica</button>
                <button onClick={()=>setShowPost(false)} style={{...L.btnOut,flex:1}}>Annulla</button>
              </div>
            </Modal>
          )}
        </>
      )}

      {/* GRUPPI */}
      {tab==="gruppi"&&(
        <>
          <button onClick={()=>setShowCreateGroup(true)} style={{...L.btn,width:"100%",marginBottom:14}}>
            + Crea nuovo gruppo
          </button>

          {groups.length===0&&(
            <div style={{...L.cardWarm,textAlign:"center",padding:28}}>
              <div style={{fontSize:36,marginBottom:10}}>👥</div>
              <div style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:6}}>Nessun gruppo ancora</div>
              <div style={{fontSize:13,color:C.textLight,lineHeight:1.6}}>Crea un gruppo per un evento, una festa o un'attività e tieni tutti aggiornati!</div>
            </div>
          )}

          {groups.map(g=>{
            const msgs=groupChats[g.id]||[];
            const last=msgs[msgs.length-1];
            return(
              <div key={g.id} style={{...L.card,cursor:"pointer"}} onClick={()=>setActiveGroup(g)} className="fade-up">
                <div style={L.row}>
                  <div style={{width:46,height:46,borderRadius:14,background:C.redPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{g.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500,color:C.text}}>{g.name}</div>
                    <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{g.members.length} partecipanti</div>
                    {g.linkedEvent&&(
                      <div style={{fontSize:11,color:C.red,marginTop:3}}>
                        📅 {g.linkedEvent.title} · {g.linkedEvent.time}
                      </div>
                    )}
                    {last&&<div style={{fontSize:12,color:C.textLight,marginTop:3,fontStyle:"italic"}}>"{last.text}"</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:10,color:C.textLight}}>{g.created}</div>
                    {msgs.length>0&&<div style={{...L.pill,background:C.red,color:C.white,marginTop:4,fontSize:10}}>{msgs.length}</div>}
                  </div>
                </div>
              </div>
            );
          })}

          {/* Gruppi collegati agli impegni */}
          {events.filter(e=>!groups.find(g=>g.linkedEvent?.id===e.id)).length>0&&(
            <>
              <div style={L.secLabel}>Crea gruppo da impegno</div>
              {events.filter(e=>!groups.find(g=>g.linkedEvent?.id===e.id)).slice(0,5).map(e=>{
                const t=TYPE_MAP[e.type]||TYPE_MAP.altro;
                return(
                  <div key={e.id} style={{...L.card,...L.row}} className="fade-up">
                    <div style={{width:36,height:36,borderRadius:"50%",background:t.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{t.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500,color:C.text}}>{e.title}</div>
                      <div style={{fontSize:11,color:C.textLight}}>⏰ {e.time}</div>
                    </div>
                    <button onClick={()=>{setNewGroup({name:`Gruppo ${e.title}`,desc:"",linkedEvent:e.id,emoji:t.icon||"👥"});setShowCreateGroup(true);}} style={{...L.btnOut,padding:"6px 12px",fontSize:12,whiteSpace:"nowrap"}}>
                      + Gruppo
                    </button>
                  </div>
                );
              })}
            </>
          )}

          {showCreateGroup&&(
            <Modal onClose={()=>setShowCreateGroup(false)} title="Nuovo gruppo">
              {/* Emoji selector */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:C.textLight,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Icona gruppo</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {EMOJIS.map(em=>(
                    <div key={em} onClick={()=>setNewGroup({...newGroup,emoji:em})} style={{width:40,height:40,borderRadius:12,background:newGroup.emoji===em?C.red:C.stone,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",transition:"all 0.15s"}}>
                      {em}
                    </div>
                  ))}
                </div>
              </div>
              <input style={L.input} placeholder="Nome gruppo *" value={newGroup.name} onChange={e=>setNewGroup({...newGroup,name:e.target.value})}/>
              <input style={L.input} placeholder="Descrizione (opzionale)" value={newGroup.desc} onChange={e=>setNewGroup({...newGroup,desc:e.target.value})}/>
              {/* Link to event */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:12,color:C.textLight,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>Collega a un impegno</div>
                <select style={{...L.input,marginBottom:0}} value={newGroup.linkedEvent} onChange={e=>setNewGroup({...newGroup,linkedEvent:e.target.value})}>
                  <option value="">— Nessun impegno collegato —</option>
                  {events.map(e=><option key={e.id} value={e.id}>{e.title} · {e.time}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:10,marginTop:6}}>
                <button onClick={createGroup} style={{...L.btn,flex:1}}>Crea gruppo</button>
                <button onClick={()=>setShowCreateGroup(false)} style={{...L.btnOut,flex:1}}>Annulla</button>
              </div>
            </Modal>
          )}
        </>
      )}

      {/* CONTATTI - Ordine alfabetico */}
      {tab==="contatti"&&(
        <>
          {contactsStep==="idle"&&(
            <div>
              <div style={{...L.card,background:C.text,border:"none",textAlign:"center",padding:"32px 22px"}}>
                <div style={{width:64,height:64,borderRadius:"50%",background:"white",margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <svg width="32" height="32" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.6-8 19.6-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.6 5.1C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.7 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
                </div>
                <div style={{fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:20,color:C.white,marginBottom:8}}>Accedi con Google</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.7,marginBottom:22}}>Importa i contatti e trovare le tue amiche su Mamis.</div>
                <button onClick={handleGoogleLogin} style={{background:C.white,color:C.text,border:"none",borderRadius:14,padding:"13px 28px",fontSize:14,fontWeight:600,cursor:"pointer",...L.row,gap:10,margin:"0 auto"}}>
                  <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.3 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.6-8 19.6-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.6 5.1C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.7 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
                  Continua con Google
                </button>
              </div>
              <div style={{textAlign:"center",marginTop:8}}>
                <button onClick={()=>{setContactsStep("loading");setTimeout(()=>{setContacts(MOCK_CONTACTS);setContactsStep("results");},1800);}} style={{background:"none",border:"none",color:C.textLight,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
                  Oppure importa i contatti del telefono
                </button>
              </div>
            </div>
          )}
          {contactsStep==="google-loading"&&<div style={{textAlign:"center",padding:"80px 20px"}}><div style={{width:56,height:56,borderRadius:"50%",background:C.redPale,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",animation:"spin 1.5s linear infinite",fontSize:28}}>G</div><div style={{fontSize:15,fontWeight:500,color:C.text}}>Connessione a Google...</div></div>}
          {contactsStep==="loading"&&<div style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:48,display:"inline-block",animation:"spin 1.2s linear infinite"}}>📱</div><div style={{fontSize:15,fontWeight:500,color:C.text,marginTop:18}}>Cerco le tue amiche...</div></div>}
          {contactsStep==="results"&&(
            <>
              {googleUser&&(
                <div style={{...L.card,background:C.text,border:"none",...L.row,padding:"13px 16px",marginBottom:14}}>
                  {googleUser.picture?<img src={googleUser.picture} style={{width:38,height:38,borderRadius:"50%",flexShrink:0}} alt=""/>:<div style={{width:38,height:38,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:16,flexShrink:0}}>👤</div>}
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.white}}>{googleUser.name}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.55)"}}>{googleUser.email}</div></div>
                  <button onClick={()=>{setGoogleUser(null);setContactsStep("idle");setContacts([]);}} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,color:"rgba(255,255,255,0.7)",fontSize:11,padding:"5px 10px",cursor:"pointer"}}>Esci</button>
                </div>
              )}
              <div style={{...L.card,background:C.red,border:"none",padding:"14px 18px",marginBottom:14}}>
                <div style={{display:"flex",gap:0,textAlign:"center"}}>
                  {[{v:contacts.filter(c=>c.onMamis).length,l:"su Mamis"},{v:contacts.filter(c=>!c.onMamis).length,l:"invitare"},{v:contacts.length,l:"totali"}].map((s,i)=>(
                    <div key={i} style={{flex:1}}><div style={{fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:24,color:C.white}}>{s.v}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>{s.l}</div></div>
                  ))}
                </div>
              </div>
              {/* A-Z index */}
              <div style={L.secLabel}>A-Z · Già su Mamis</div>
              {sortedContacts.filter(c=>c.onMamis).map((c,i,arr)=>{
                const showLetter=i===0||arr[i-1].name.charAt(0).toUpperCase()!==c.name.charAt(0).toUpperCase();
                return(
                  <div key={c.id}>
                    {showLetter&&<div style={{fontSize:12,fontWeight:500,color:C.red,padding:"4px 4px",marginBottom:4,letterSpacing:1}}>{c.name.charAt(0).toUpperCase()}</div>}
                    <div style={{...L.card,...L.row,marginBottom:8}}>
                      <div style={{width:38,height:38,borderRadius:"50%",background:c.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,color:c.color,fontSize:13,flexShrink:0}}>{c.init}</div>
                      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:C.text}}>{c.name}</div><div style={{fontSize:12,color:C.textLight}}>👶 {c.bebe}</div></div>
                      {added[c.id]
                        ?<div style={{...L.pill,background:C.greenPale,color:C.green,fontSize:11}}>✓</div>
                        :<div style={{display:"flex",gap:6}}>
                          <button onClick={()=>setChatWith(c)} style={{...L.btnOut,padding:"6px 10px",fontSize:12}}>Chat</button>
                          <button onClick={()=>setAdded({...added,[c.id]:true})} style={{...L.btn,padding:"6px 10px",fontSize:12}}>+</button>
                        </div>
                      }
                    </div>
                  </div>
                );
              })}
              <div style={L.secLabel}>A-Z · Invita su Mamis</div>
              {sortedContacts.filter(c=>!c.onMamis).map((c,i,arr)=>{
                const showLetter=i===0||arr[i-1].name.charAt(0).toUpperCase()!==c.name.charAt(0).toUpperCase();
                return(
                  <div key={c.id}>
                    {showLetter&&<div style={{fontSize:12,fontWeight:500,color:C.textLight,padding:"4px 4px",marginBottom:4,letterSpacing:1}}>{c.name.charAt(0).toUpperCase()}</div>}
                    <div style={{...L.card,...L.row,marginBottom:8}}>
                      <div style={{width:38,height:38,borderRadius:"50%",background:C.stone,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,color:C.textMid,fontSize:13,flexShrink:0}}>{c.init}</div>
                      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:C.text}}>{c.name}</div><div style={{fontSize:12,color:C.textLight}}>{c.phone||c.email||""}</div></div>
                      {invited[c.id]?<div style={{...L.pill,background:"#FFF3E0",color:C.peach,fontSize:11}}>📨</div>:<button onClick={()=>setInvited({...invited,[c.id]:true})} style={{...L.btnOut,padding:"6px 10px",fontSize:12}}>Invita</button>}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </>
      )}

      {/* CHAT */}
      {tab==="chat"&&(
        <>
          <div style={L.secLabel}>Conversazioni</div>
          {Object.keys(chats).filter(k=>chats[k]?.length>0).length===0&&(
            <div style={{...L.cardWarm,textAlign:"center",padding:24}}>
              <div style={{fontSize:28,marginBottom:8}}>💬</div>
              <div style={{fontSize:14,color:C.textMid}}>Nessuna conversazione ancora.</div>
            </div>
          )}
          {MOCK_CONTACTS.filter(c=>chats[c.id]?.length>0).map(c=>{
            const msgs=chats[c.id]||[];
            const last=msgs[msgs.length-1];
            return(
              <div key={c.id} style={{...L.card,...L.row,cursor:"pointer"}} onClick={()=>setChatWith(c)}>
                <div style={{width:40,height:40,borderRadius:"50%",background:c.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,color:c.color,fontSize:14,flexShrink:0}}>{c.init}</div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:C.text}}>{c.name}</div><div style={{fontSize:12,color:C.textLight,marginTop:2}}>{last?.text||""}</div></div>
                <div style={{fontSize:11,color:C.textLight}}>{last?.time||""}</div>
              </div>
            );
          })}
          <div style={L.secLabel}>Inizia una conversazione</div>
          {MOCK_CONTACTS.filter(c=>c.onMamis&&!chats[c.id]?.length).sort((a,b)=>a.name.localeCompare(b.name,"it")).map(c=>(
            <div key={c.id} style={{...L.card,...L.row,cursor:"pointer"}} onClick={()=>setChatWith(c)}>
              <div style={{width:38,height:38,borderRadius:"50%",background:c.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:500,color:c.color,fontSize:13,flexShrink:0}}>{c.init}</div>
              <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:C.text}}>{c.name}</div><div style={{fontSize:12,color:C.textLight}}>👶 {c.bebe}</div></div>
              <button style={{...L.btnOut,padding:"6px 12px",fontSize:12}}>Chat</button>
            </div>
          ))}
        </>
      )}
    </div>
  );
}
  const [showPost,setShowPost]=useState(false);
  const [newPost,setNewPost]=useState({text:"",tag:"Generale"});
  const [commentId,setCommentId]=useState(null);
  const [commentText,setCommentText]=useState("");
  const [contactsStep,setContactsStep]=useState("idle");
  const [contacts,setContacts]=useState([]);
  const [added,setAdded]=useState({});
  const [invited,setInvited]=useState({});
  const [googleUser,setGoogleUser]=useState(null);

  // Google OAuth via popup
  const handleGoogleLogin=()=>{
    setContactsStep("google-loading");
    // Load Google Identity Services
    const loadGIS=()=>{
      if(window.google?.accounts){
        startGoogleAuth();return;
      }
      const s=document.createElement("script");
      s.src="https://accounts.google.com/gsi/client";
      s.async=true;
      s.onload=startGoogleAuth;
      document.head.appendChild(s);
    };
    const startGoogleAuth=()=>{
      try{
        const client=window.google.accounts.oauth2.initTokenClient({
          client_id:"256479728603-qu5it67lmi6pd70n9iil0v5oamaa5rji.apps.googleusercontent.com",
          scope:"https://www.googleapis.com/auth/contacts.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email",
          callback:async(tokenResponse)=>{
            if(tokenResponse.error){setContactsStep("idle");return;}
            // Get user info
            try{
              const [userRes,contactsRes]=await Promise.all([
                fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:`Bearer ${tokenResponse.access_token}`}}),
                fetch("https://people.googleapis.com/v1/people/me/connections?personFields=names,emailAddresses,phoneNumbers&pageSize=100",{headers:{Authorization:`Bearer ${tokenResponse.access_token}`}}),
              ]);
              const userData=await userRes.json();
              const contactsData=await contactsRes.json();
              setGoogleUser({name:userData.name,email:userData.email,picture:userData.picture});
              // Map Google contacts to Mamis format
              const googleContacts=(contactsData.connections||[]).map((p,i)=>({
                id:"g"+i,
                name:p.names?.[0]?.displayName||"Contatto",
                init:(p.names?.[0]?.displayName||"?").charAt(0).toUpperCase(),
                email:p.emailAddresses?.[0]?.value||"",
                phone:p.phoneNumbers?.[0]?.value||"",
                color:[C.red,C.green,C.peach,"#9B6FD0",C.navy][i%5],
                onMamis:Math.random()>0.6, // In produzione: vera verifica lato server
                bebe:Math.random()>0.5?"Bimbo/a, "+(Math.floor(Math.random()*8)+1)+"a":null,
              }));
              setContacts(googleContacts.length>0?googleContacts:MOCK_CONTACTS);
              setContactsStep("results");
            }catch(e){
              // Fallback ai contatti mock se errore API
              setGoogleUser({name:"Utente Google",email:"",picture:null});
              setContacts(MOCK_CONTACTS);setContactsStep("results");
            }
          },
        });
        client.requestAccessToken();
      }catch(e){
        // Se non c'è client ID configurato, usa mock con utente finto
        setTimeout(()=>{
          setGoogleUser({name:"Sara Conti",email:"sara.conti@gmail.com",picture:null});
          setContacts(MOCK_CONTACTS);setContactsStep("results");
        },1500);
      }
    };
    loadGIS();
  };
  const [chatWith,setChatWith]=useState(null);
  const [chatMsg,setChatMsg]=useState("");
  const [chats,setChats]=useState({});

  const likePost=id=>setPosts(p=>p.map(x=>x.id===id?{...x,likes:x.liked?x.likes-1:x.likes+1,liked:!x.liked}:x));
  const sendComment=id=>{
    if(!commentText.trim())return;
    setPosts(p=>p.map(x=>x.id===id?{...x,comments:[...x.comments,{id:uid(),text:commentText,user:"Tu",time:"ora"}]}:x));
    setCommentText("");
  };
  const publishPost=()=>{
    if(!newPost.text.trim())return;
    setPosts(p=>[{id:uid(),user:"Sara C.",avatar:"👩‍💼",time:"ora",text:newPost.text,likes:0,liked:false,comments:[],tag:newPost.tag},...p]);
    setNewPost({text:"",tag:"Generale"});setShowPost(false);
  };
  const sendChatMsg=()=>{
    if(!chatMsg.trim()||!chatWith)return;
    const key=chatWith.id;
    setChats(prev=>({...prev,[key]:[...(prev[key]||[]),{id:uid(),text:chatMsg,from:"me",time:"ora"}]}));
    setChatMsg("");
  };

  const tabs=[{id:"feed",l:"Feed"},{id:"contatti",l:"Contatti"},{id:"chat",l:"Chat"}];

  // Chat view
  if(chatWith){
    const msgs=chats[chatWith.id]||[];
    return(
      <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"100%"}}>
        <div style={{...L.row,marginBottom:16}}>
          <button onClick={()=>setChatWith(null)} style={{background:"none",border:"none",color:C.textMid,fontSize:22,cursor:"pointer",padding:0}}>←</button>
          <div style={{width:36,height:36,borderRadius:"50%",background:C.red+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:C.red,fontSize:14}}>{chatWith.init}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:500,color:C.text}}>{chatWith.name}</div>
            {chatWith.bebe&&<div style={{fontSize:11,color:C.textLight}}>👶 {chatWith.bebe}</div>}
          </div>

function PlacesScreen(){
  const [geo,setGeo]=useState("idle");
  const [coords,setCoords]=useState(null);
  const [address,setAddress]=useState("");
  const [filter,setFilter]=useState("Tutti");
  const [places,setPlaces]=useState([]);
  const [loading,setLoading]=useState(false);
  const [saved,setSaved]=useState({});
  const [expanded,setExpanded]=useState(null);
  const [error,setError]=useState("");
  const mapRef=useRef(null);
  const gMapRef=useRef(null);
  const markersRef=useRef([]);

  const placeTypes={"Tutti":["restaurant","bar","cafe","park"],"Ristoranti":["restaurant"],"Bar":["bar","cafe"],"Parchi":["park"],"Gelaterie":["ice_cream"]};

  useEffect(()=>{
    if(window.google||document.querySelector('script[data-maps]'))return;
    const s=document.createElement("script");
    s.src=`https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=places`;
    s.async=true;s.setAttribute('data-maps','1');
    document.head.appendChild(s);
  },[]);

  const waitMaps=()=>new Promise((res,rej)=>{
    let t=0;const iv=setInterval(()=>{if(window.google){clearInterval(iv);res();}if(++t>30){clearInterval(iv);rej();}},500);
  });

  const reverseGeo=async(lat,lng)=>{
    const gc=new window.google.maps.Geocoder();
    return new Promise(res=>{
      gc.geocode({location:{lat,lng}},(r,s)=>{
        if(s==="OK"&&r[0]){
          const c=r[0].address_components.find(x=>x.types.includes("locality")||x.types.includes("administrative_area_level_3"));
          res(c?c.long_name:r[0].formatted_address.split(",")[0]);
        }else res("La tua posizione");
      });
    });
  };

  const searchPlaces=async(lat,lng,types)=>{
    const map=new window.google.maps.Map(document.createElement("div"),{center:{lat,lng},zoom:15});
    const svc=new window.google.maps.places.PlacesService(map);
    const all=[];
    for(const type of types){
      // Search 1: baby friendly keyword
      await new Promise(res=>{
        svc.nearbySearch({location:{lat,lng},radius:2500,type,keyword:"baby friendly bambini seggiolone famiglia"},(results,status)=>{
          if(status===window.google.maps.places.PlacesServiceStatus.OK&&results){
            all.push(...results.filter(r=>r.rating&&r.rating>=4.0).map(r=>({...r,babyFriendly:true})));
          }
          res();
        });
      });
      // Search 2: general high rated
      await new Promise(res=>{
        svc.nearbySearch({location:{lat,lng},radius:2000,type},(results,status)=>{
          if(status===window.google.maps.places.PlacesServiceStatus.OK&&results){
            all.push(...results.filter(r=>r.rating&&r.rating>=4.3));
          }
          res();
        });
      });
    }
    const seen=new Set();
    return all
      .filter(r=>{if(seen.has(r.place_id))return false;seen.add(r.place_id);return true;})
      .map(p=>({...p,dist:p.geometry?getDistance(lat,lng,p.geometry.location.lat(),p.geometry.location.lng()):9999}))
      .sort((a,b)=>{
        // Baby friendly first, then by distance
        if(a.babyFriendly&&!b.babyFriendly)return -1;
        if(!a.babyFriendly&&b.babyFriendly)return 1;
        return a.dist-b.dist;
      }).slice(0,20);
  };

  const initMap=useCallback((lat,lng,results)=>{
    if(!mapRef.current||!window.google)return;
    const map=new window.google.maps.Map(mapRef.current,{
      center:{lat,lng},zoom:14,
      disableDefaultUI:true,
      zoomControl:true,
      styles:[
        {featureType:"all",elementType:"labels.text.fill",stylers:[{color:"#1A1A1A"}]},
        {featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},
        {featureType:"water",elementType:"geometry",stylers:[{color:"#E8E4DE"}]},
        {featureType:"road",elementType:"geometry",stylers:[{color:"#FFFFFF"}]},
        {featureType:"landscape",elementType:"geometry",stylers:[{color:"#FAF9F7"}]},
      ],
    });
    gMapRef.current=map;
    markersRef.current.forEach(m=>m.setMap(null));
    markersRef.current=[];
    new window.google.maps.Marker({position:{lat,lng},map,title:"Tu",icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:10,fillColor:C.text,fillOpacity:1,strokeColor:"white",strokeWeight:3}});
    results.slice(0,15).forEach((p,i)=>{
      if(!p.geometry)return;
      const m=new window.google.maps.Marker({
        position:{lat:p.geometry.location.lat(),lng:p.geometry.location.lng()},
        map,title:p.name,
        label:{text:String(i+1),color:"white",fontSize:"11px",fontWeight:"500"},
        icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:13,fillColor:C.red,fillOpacity:1,strokeColor:"white",strokeWeight:2},
      });
      m.addListener("click",()=>setExpanded(p.place_id));
      markersRef.current.push(m);
    });
  },[]);

  const handleGeo=()=>{
    setGeo("loading");setError("");
    if(!navigator.geolocation){setError("Geolocalizzazione non disponibile");setGeo("idle");return;}
    navigator.geolocation.getCurrentPosition(async pos=>{
      const {latitude:lat,longitude:lng}=pos.coords;
      setCoords({lat,lng});
      try{
        await waitMaps();
        const city=await reverseGeo(lat,lng);
        setAddress(city);setGeo("granted");
        const results=await doSearch(lat,lng,"Tutti");
        setTimeout(()=>initMap(lat,lng,results),300);
      }catch(e){setError("Errore Maps. Riprova.");setGeo("idle");}
    },()=>{setError("Abilita la posizione nelle impostazioni.");setGeo("idle");},{timeout:12000,enableHighAccuracy:true});
  };

  const doSearch=async(lat,lng,f)=>{
    setLoading(true);setPlaces([]);
    try{const r=await searchPlaces(lat,lng,placeTypes[f]||placeTypes["Tutti"]);setPlaces(r);setLoading(false);return r;}
    catch(e){setLoading(false);return[];}
  };

  const handleFilter=f=>{setFilter(f);if(coords)doSearch(coords.lat,coords.lng,f);};

  const fetchPhone=async(placeId)=>{
    if(!window.google)return;
    const map=new window.google.maps.Map(document.createElement("div"),{center:{lat:0,lng:0},zoom:1});
    const svc=new window.google.maps.places.PlacesService(map);
    svc.getDetails({placeId,fields:["formatted_phone_number","international_phone_number"]},(result,status)=>{
      if(status===window.google.maps.places.PlacesServiceStatus.OK&&result){
        const phone=result.formatted_phone_number||result.international_phone_number;
        if(phone){
          setPlaces(prev=>prev.map(p=>p.place_id===placeId?{...p,formatted_phone_number:phone}:p));
        }
      }
    });
  };

  const navigate=place=>{
    const lat=place.geometry.location.lat();
    const lng=place.geometry.location.lng();
    const ua=navigator.userAgent.toLowerCase();
    const url=/iphone|ipad|ipod/.test(ua)
      ?`maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`
      :`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=${place.place_id}&travelmode=driving`;
    window.open(url,"_blank");
  };

  const placeIcon=types=>{
    if(!types)return"🍽️";
    if(types.includes("park"))return"🌳";
    if(types.includes("bar"))return"🍸";
    if(types.includes("cafe"))return"☕";
    return"🍽️";
  };

  if(geo==="idle")return(
    <div className="fade-up">
      <div style={{...L.card,background:C.red,border:"none",textAlign:"center",padding:"40px 24px"}}>
        <div style={{fontSize:52,marginBottom:16,display:"inline-block",animation:"pulse 2s infinite"}}>📍</div>
        <div style={{...T.display,fontSize:24,color:C.white,marginBottom:10}}>Locali baby friendly vicino a te</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.8)",lineHeight:1.7,marginBottom:8}}>
          Risultati reali da Google Maps<br/>Solo ⭐ 4–5 stelle · Con navigatore
        </div>
        {error&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"10px 14px",fontSize:13,color:C.white,marginBottom:14,marginTop:10}}>{error}</div>}
        <div style={{marginBottom:20}}/>
        <button onClick={handleGeo} style={{background:C.white,color:C.red,border:"none",borderRadius:14,padding:"14px 32px",fontSize:15,fontWeight:500,cursor:"pointer"}}>
          Attiva posizione
        </button>
      </div>
    </div>
  );

  if(geo==="loading")return(
    <div style={{textAlign:"center",padding:"90px 20px"}} className="fade-up">
      <div style={{fontSize:52,display:"inline-block",animation:"pulse 1.2s infinite"}}>📍</div>
      <div style={{fontSize:15,fontWeight:500,color:C.text,marginTop:20}}>Cerco la tua posizione...</div>
      <div style={{fontSize:13,color:C.textLight,marginTop:6}}>Connessione a Google Maps</div>
    </div>
  );

  return(
    <div className="fade-up">
      {/* Location */}
      <div style={{...L.card,background:C.text,border:"none",...L.row,padding:"13px 18px",marginBottom:14}}>
        <span style={{color:C.red}}>📍</span>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:500,color:C.white}}>{address}</div>
          {coords&&<div style={{fontSize:10,color:"rgba(255,255,255,0.5)",letterSpacing:0.5}}>{coords.lat.toFixed(5)}, {coords.lng.toFixed(5)}</div>}
        </div>
        <button onClick={()=>{setGeo("idle");setPlaces([]);}} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"rgba(255,255,255,0.8)",fontSize:12,padding:"5px 12px",cursor:"pointer",fontWeight:500}}>Cambia</button>
      </div>

      {/* Real Google Map */}
      <div ref={mapRef} style={{width:"100%",height:190,borderRadius:20,overflow:"hidden",marginBottom:14,background:C.stone,border:`1px solid ${C.stone}`}}/>

      {/* Filters */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {["Tutti","Ristoranti","Bar","Parchi","Gelaterie"].map(f=>(
          <div key={f} onClick={()=>handleFilter(f)} style={{...L.pill,flexShrink:0,cursor:"pointer",background:filter===f?C.text:C.stone,color:filter===f?C.white:C.textMid,transition:"all 0.15s",whiteSpace:"nowrap"}}>{f}</div>
        ))}
      </div>

      {loading&&<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:36,display:"inline-block",animation:"spin 0.8s linear infinite"}}>🔍</div><div style={{fontSize:13,color:C.textMid,marginTop:12}}>Cerco su Google Maps...</div></div>}

      {!loading&&(
        <>
          <div style={L.secLabel}>{places.length} luoghi trovati</div>
          {places.length===0&&<div style={{...L.cardWarm,textAlign:"center",padding:28,color:C.textMid,fontSize:14}}>Nessun locale trovato.<br/>Prova un altro filtro.</div>}
          {places.map((r,i)=>{
            const isOpen=r.opening_hours?.open_now;
            const isExp=expanded===r.place_id;
            const isSaved=saved[r.place_id];
            const isRest=r.types?.some(t=>["restaurant","bar","cafe","food"].includes(t));
            const phone=r.formatted_phone_number||r.international_phone_number||null;
            return(
              <div key={r.place_id} style={{...L.card,transition:"all 0.2s"}} className="fade-up">
                {/* Header row */}
                <div style={{...L.row,cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:r.place_id)}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:C.red,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:500,flexShrink:0}}>{i+1}</div>
                  <div style={{width:44,height:44,borderRadius:14,background:C.redPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{placeIcon(r.types)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                      <span style={{fontSize:14,fontWeight:500,color:C.text,lineHeight:1.3,flex:1}}>{r.name}</span>
                      <span style={{fontSize:13,color:C.peach,flexShrink:0,fontWeight:500}}>⭐{r.rating?.toFixed(1)}</span>
                    </div>
                    <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{r.vicinity}</div>
                    <div style={{display:"flex",gap:8,marginTop:4,alignItems:"center",flexWrap:"wrap"}}>
                      {r.dist&&<span style={{fontSize:12,color:C.green,fontWeight:500}}>📍{mToText(r.dist)}</span>}
                      {r.user_ratings_total&&<span style={{fontSize:11,color:C.textLight}}>({r.user_ratings_total})</span>}
                      {r.opening_hours&&<span style={{fontSize:11,color:isOpen?C.green:C.red,fontWeight:500}}>{isOpen?"Aperto":"Chiuso"}</span>}
                      {r.babyFriendly&&<span style={{fontSize:10,background:"#E8F5EE",color:C.green,borderRadius:8,padding:"2px 7px",fontWeight:500}}>👶 Baby</span>}
                    </div>
                  </div>
                </div>

                {/* Rating bar */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
                  <div style={{flex:1,height:4,borderRadius:4,background:C.stone,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:C.red,width:`${((r.rating||0)/5)*100}%`,transition:"width 0.5s ease"}}/>
                  </div>
                  <span style={{fontSize:11,color:C.textLight,flexShrink:0}}>{r.rating?.toFixed(1)}/5</span>
                </div>

                {/* Always visible action bar */}
                <div style={{...L.row,justifyContent:"space-between",marginTop:12,paddingTop:10,borderTop:`1px solid ${C.stone}`}}>
                  <div style={{...L.row,gap:16}}>
                    {/* ❤️ CUORE */}
                    <button onClick={e=>{e.stopPropagation();setSaved({...saved,[r.place_id]:!isSaved});}} style={{background:"none",border:"none",cursor:"pointer",padding:0,...L.row,gap:5}}>
                      <svg width="24" height="24" viewBox="0 0 24 24" style={{transition:"transform 0.25s",transform:isSaved?"scale(1.2)":"scale(1)"}}>
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                          fill={isSaved?C.red:"none"} stroke={isSaved?C.red:C.textLight} strokeWidth="1.8"/>
                      </svg>
                      <span style={{fontSize:12,color:isSaved?C.red:C.textLight}}>{isSaved?"Salvato":""}</span>
                    </button>
                    {/* 🧭 NAVIGA */}
                    <button onClick={()=>navigate(r)} style={{background:"none",border:"none",cursor:"pointer",padding:0,...L.row,gap:5}}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.textLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
                      </svg>
                      <span style={{fontSize:12,color:C.textLight}}>Naviga</span>
                    </button>
                  </div>
                  {/* 📞 CHIAMA */}
                  {isRest&&(
                    <button onClick={()=>{
                      if(phone){window.open(`tel:${phone}`,"_self");}
                      else{setExpanded(isExp?null:r.place_id);fetchPhone(r.place_id);}
                    }} style={{...L.btn,padding:"8px 16px",fontSize:13,...L.row,gap:6}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                      </svg>
                      Chiama
                    </button>
                  )}
                </div>

                {/* Expanded detail */}
                {isExp&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.stone}`}} className="fade-up">
                    {r.vicinity&&<div style={{fontSize:12,color:C.textMid,marginBottom:8}}>📍 {r.vicinity}</div>}
                    {phone&&<div style={{fontSize:13,color:C.text,fontWeight:500,marginBottom:10}}>📞 {phone}</div>}
                    {!phone&&isRest&&(
                      <div style={{fontSize:12,color:C.textLight,marginBottom:10,fontStyle:"italic"}}>
                        Tocca "Chiama" per cercare il numero
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>navigate(r)} style={{...L.btn,flex:1,padding:"11px",fontSize:13}}>
                        🧭 Naviga con Maps
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// ── BABYSITTER ────────────────────────────────────────────────────────────────
function BabySitterScreen({userType,setUserType}){
  const [tab,setTab]=useState("cerca");
  const [geo,setGeo]=useState("idle");
  const [coords,setCoords]=useState(null);
  const [city,setCity]=useState("");
  const [search,setSearch]=useState("");
  const [onlyAvail,setOnlyAvail]=useState(false);
  const [sortBy,setSortBy]=useState("dist");
  const [expanded,setExpanded]=useState(null);
  const [saved,setSaved]=useState({});
  const [liked,setLiked]=useState({});
  const [chatBS,setChatBS]=useState(null);
  const [chatMsg,setChatMsg]=useState("");
  const [chats,setChats]=useState({});
  const [regForm,setRegForm]=useState({nome:"",cognome:"",eta:"",exp:"",bio:"",price:"10",phone:"",tags:[]});
  const [registered,setRegistered]=useState(false);
  const TAG_OPTS=["Neonati","Compiti","Primo soccorso","Gemelli","Bilingue","Attività creative","Disabilità","Notturno"];

  const handleGeo=()=>{
    setGeo("loading");
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        setCoords({lat:pos.coords.latitude,lng:pos.coords.longitude});
        let c="default";
        if(pos.coords.latitude>44)c="Milano";
        else if(pos.coords.latitude>41&&pos.coords.latitude<42)c="Roma";
        setCity(c==="default"?"Vicino a te":c);
        setGeo("granted");
      },()=>{setCity("Vicino a te");setGeo("granted");},{timeout:8000});
    }else{setCity("Vicino a te");setGeo("granted");}
  };

  const cityKey=city==="Roma"?"Roma":city==="Milano"?"Milano":"default";
  let bs=(MOCK_BS[cityKey]||MOCK_BS.default).filter(b=>b.name.toLowerCase().includes(search.toLowerCase())&&(!onlyAvail||b.avail));
  if(sortBy==="rating")bs=[...bs].sort((a,b)=>b.rating-a.rating);
  else if(sortBy==="price")bs=[...bs].sort((a,b)=>parseInt(a.price)-parseInt(b.price));

  const toggleLike=id=>setLiked(p=>({...p,[id]:!p[id]}));
  const toggleSave=id=>setSaved(p=>({...p,[id]:!p[id]}));
  const callBS=phone=>window.open(`tel:${phone}`,"_self");

  const sendChatMsg=()=>{
    if(!chatMsg.trim()||!chatBS)return;
    const key=chatBS.id;
    setChats(prev=>({...prev,[key]:[...(prev[key]||[]),{id:uid(),text:chatMsg,from:"me",time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}]}));
    setChatMsg("");
    // Simulated reply after 1.5s
    setTimeout(()=>{
      const replies=["Ciao! Sono disponibile 😊","Quando avresti bisogno?","Perfetto, possiamo sentirci!","Sì, conosco bene la zona!","Mandami i dettagli e mi organizzo 🌸"];
      const reply=replies[Math.floor(Math.random()*replies.length)];
      setChats(prev=>({...prev,[key]:[...(prev[key]||[]),{id:uid(),text:reply,from:"bs",time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}]}));
    },1500);
  };

  const submitReg=()=>{
    if(!regForm.nome||!regForm.cognome||!regForm.phone)return;
    setRegistered(true);setUserType("babysitter");setTab("cerca");
  };

  // CHAT VIEW
  if(chatBS){
    const msgs=chats[chatBS.id]||[];
    return(
      <div className="fade-up" style={{display:"flex",flexDirection:"column",height:"100%"}}>
        {/* Chat header */}
        <div style={{...L.card,...L.row,padding:"12px 16px",marginBottom:14}}>
          <button onClick={()=>setChatBS(null)} style={{background:"none",border:"none",color:C.textMid,fontSize:22,cursor:"pointer",padding:0,marginRight:4}}>←</button>
          <div style={{width:40,height:40,borderRadius:14,background:chatBS.avail?C.greenPale:C.stone,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{chatBS.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:500,color:C.text}}>{chatBS.name}</div>
            <div style={{fontSize:11,color:chatBS.avail?C.green:C.textLight,fontWeight:500}}>{chatBS.avail?"● Disponibile":"● Non disponibile"}</div>
          </div>
          <button onClick={()=>callBS(chatBS.phone)} style={{...L.btn,padding:"8px 14px",fontSize:12}}>📞</button>
        </div>
        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",marginBottom:12}}>
          {msgs.length===0&&(
            <div style={{textAlign:"center",padding:"30px 20px"}}>
              <div style={{width:56,height:56,borderRadius:18,background:C.redPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>{chatBS.icon}</div>
              <div style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:4}}>{chatBS.name}</div>
              <div style={{fontSize:12,color:C.textLight,lineHeight:1.6}}>{chatBS.price} · {chatBS.dist}<br/>Inizia la conversazione 🌸</div>
            </div>
          )}
          {msgs.map(m=>(
            <div key={m.id} style={{display:"flex",justifyContent:m.from==="me"?"flex-end":"flex-start",marginBottom:8,padding:"0 4px"}}>
              {m.from==="bs"&&<div style={{width:28,height:28,borderRadius:10,background:C.stone,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginRight:6,alignSelf:"flex-end"}}>{chatBS.icon}</div>}
              <div style={{background:m.from==="me"?C.red:C.white,color:m.from==="me"?C.white:C.text,padding:"10px 14px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",maxWidth:"72%",fontSize:14,lineHeight:1.5,border:m.from==="bs"?`1px solid ${C.stone}`:"none"}}>
                {m.text}
                <div style={{fontSize:10,color:m.from==="me"?"rgba(255,255,255,0.6)":C.textLight,marginTop:4,textAlign:"right"}}>{m.time}</div>
              </div>
            </div>
          ))}
        </div>
        {/* Input */}
        <div style={{...L.row}}>
          <input style={{...L.input,flex:1,marginBottom:0,borderRadius:14}} placeholder={`Scrivi a ${chatBS.name}...`} value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChatMsg()}/>
          <button onClick={sendChatMsg} style={{...L.btn,padding:"13px 18px",marginLeft:8,flexShrink:0}}>↩</button>
        </div>
      </div>
    );
  }

  return(
    <div className="fade-up">
      <div style={{display:"flex",background:C.stone,borderRadius:14,padding:4,marginBottom:16,gap:4}}>
        {[{id:"cerca",l:"Cerca"},{id:"registrati",l:"Diventa BS"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",borderRadius:12,padding:"9px 6px",background:tab===t.id?C.white:"transparent",color:tab===t.id?C.text:C.textMid,fontSize:13,fontWeight:500,cursor:"pointer",transition:"all 0.2s",boxShadow:tab===t.id?"0 1px 6px rgba(0,0,0,0.08)":"none"}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==="cerca"&&(
        <>
          {geo==="idle"&&(
            <div>
              <div style={{...L.card,background:C.text,border:"none",textAlign:"center",padding:"38px 24px"}}>
                <div style={{fontSize:52,marginBottom:14,display:"inline-block",animation:"pulse 2s infinite"}}>👶</div>
                <div style={{...T.display,fontSize:24,color:C.white,marginBottom:10}}>Baby sitter vicino a te</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.7,marginBottom:22}}>Profili verificati · Geolocalizzate · Contattabili direttamente</div>
                <button onClick={handleGeo} style={{background:C.red,color:C.white,border:"none",borderRadius:14,padding:"13px 30px",fontSize:15,fontWeight:500,cursor:"pointer"}}>
                  Cerca nella mia zona
                </button>
              </div>
            </div>
          )}
          {geo==="loading"&&<div style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:52,display:"inline-block",animation:"pulse 1.2s infinite"}}>👶</div><div style={{fontSize:15,fontWeight:500,color:C.text,marginTop:20}}>Cerco baby sitter vicino a te...</div></div>}
          {geo==="granted"&&(
            <>
              <div style={{...L.card,background:C.text,border:"none",...L.row,padding:"13px 18px",marginBottom:14}}>
                <span style={{color:C.red}}>📍</span>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:500,color:C.white}}>Zona: {city}</div>{coords&&<div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{coords.lat.toFixed(4)}, {coords.lng.toFixed(4)}</div>}</div>
                <button onClick={()=>setGeo("idle")} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"rgba(255,255,255,0.8)",fontSize:12,padding:"5px 12px",cursor:"pointer",fontWeight:500}}>Cambia</button>
              </div>
              <div style={{position:"relative",marginBottom:10}}>

// ── CASA ──────────────────────────────────────────────────────────────────────
function CasaScreen({shopping,setShopping,chores,setChores}){
  const [tab,setTab]=useState("spesa");
  const [showAddItem,setShowAddItem]=useState(false);
  const [showAddChore,setShowAddChore]=useState(false);
  const [newItem,setNewItem]=useState({item:"",qty:"1 pz",cat:CAT_OPTS[0]});
  const [newChore,setNewChore]=useState({task:"",icon:"🧹",day:"Oggi"});
  const [weekNum,setWeekNum]=useState(0);
  const [grocAdded,setGrocAdded]=useState(false);

  const addItem=()=>{if(!newItem.item.trim())return;setShopping(p=>[...p,{id:uid(),...newItem,done:false}]);setNewItem({item:"",qty:"1 pz",cat:CAT_OPTS[0]});setShowAddItem(false);};
  const addChore=()=>{if(!newChore.task.trim())return;setChores(p=>[...p,{id:uid(),...newChore,done:false}]);setNewChore({task:"",icon:"🧹",day:"Oggi"});setShowAddChore(false);};
  const toggleShop=id=>setShopping(p=>p.map(s=>s.id===id?{...s,done:!s.done}:s));
  const delShop=id=>setShopping(p=>p.filter(s=>s.id!==id));
  const toggleChore=id=>setChores(p=>p.map(c=>c.id===id?{...c,done:!c.done}:c));
  const delChore=id=>setChores(p=>p.filter(c=>c.id!==id));
  const addMenuGroceries=()=>{
    const ex=new Set(shopping.map(s=>s.item));
    setShopping(p=>[...p,...GROCERIES.filter(g=>!ex.has(g.item)).map(g=>({id:uid(),...g,done:false}))]);
    setGrocAdded(true);
  };

  const cats=[...new Set(shopping.map(s=>s.cat))];
  const menu=MENU_4W[weekNum];

  return(
    <div className="fade-up">
      <div style={{display:"flex",background:C.stone,borderRadius:14,padding:4,marginBottom:16,gap:4}}>
        {[{id:"spesa",l:"Spesa"},{id:"casa",l:"Faccende"},{id:"menu",l:"Menù"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",borderRadius:12,padding:"9px 6px",background:tab===t.id?C.white:"transparent",color:tab===t.id?C.text:C.textMid,fontSize:13,fontWeight:500,cursor:"pointer",transition:"all 0.2s",boxShadow:tab===t.id?"0 1px 6px rgba(0,0,0,0.08)":"none"}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==="spesa"&&(
        <>
          <div style={{...L.row,justifyContent:"space-between",marginBottom:14}}>
            <div>
              <span style={{fontSize:22,fontWeight:300,color:C.red}}>{shopping.filter(s=>!s.done).length}</span>
              <span style={{fontSize:13,color:C.textLight}}> da comprare</span>
            </div>
            <button onClick={()=>setShowAddItem(true)} style={{...L.btn,padding:"8px 18px",fontSize:13}}>+ Aggiungi</button>
          </div>
          {cats.map(cat=>{
            const items=shopping.filter(s=>s.cat===cat);
            if(!items.length)return null;
            return(
              <div key={cat} style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:500,color:C.textLight,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>{cat}</div>
                {items.map(s=>(
                  <div key={s.id} style={{...L.card,...L.row,padding:"12px 16px",opacity:s.done?0.45:1,marginBottom:8,transition:"opacity 0.2s"}} className="fade-up">
                    <div onClick={()=>toggleShop(s.id)} style={{width:24,height:24,borderRadius:7,background:s.done?C.green:"transparent",border:`1.5px solid ${s.done?C.green:C.stone}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"all 0.2s"}}>
                      {s.done&&<span style={{color:"white",fontSize:13}}>✓</span>}
                    </div>
                    <span onClick={()=>toggleShop(s.id)} style={{fontSize:14,flex:1,textDecoration:s.done?"line-through":"none",color:C.text,cursor:"pointer"}}>{s.item}</span>
                    <span style={{fontSize:12,color:C.textLight,marginRight:8}}>{s.qty}</span>
                    <button onClick={()=>delShop(s.id)} style={{background:"none",border:"none",color:C.textLight,fontSize:18,cursor:"pointer",padding:2}}>×</button>
                  </div>
                ))}
              </div>
            );
          })}
          {shopping.length===0&&<div style={{...L.cardWarm,textAlign:"center",padding:28,color:C.textMid,fontSize:14}}>Lista vuota.<br/>Tocca + per aggiungere.</div>}
          {showAddItem&&(
            <Modal onClose={()=>setShowAddItem(false)} title="Nuovo articolo">
              <input style={L.input} placeholder="Nome articolo..." value={newItem.item} onChange={e=>setNewItem({...newItem,item:e.target.value})}/>
              <input style={L.input} placeholder="Quantità (es. 2 L)" value={newItem.qty} onChange={e=>setNewItem({...newItem,qty:e.target.value})}/>
              <select style={{...L.input,marginBottom:14}} value={newItem.cat} onChange={e=>setNewItem({...newItem,cat:e.target.value})}>
                {CAT_OPTS.map(c=><option key={c}>{c}</option>)}
              </select>
              <div style={{display:"flex",gap:10}}><button onClick={addItem} style={{...L.btn,flex:1}}>Aggiungi</button><button onClick={()=>setShowAddItem(false)} style={{...L.btnOut,flex:1}}>Annulla</button></div>
            </Modal>
          )}
        </>
      )}

      {tab==="casa"&&(
        <>
          <div style={{...L.row,justifyContent:"space-between",marginBottom:14}}>
            <div><span style={{fontSize:22,fontWeight:300,color:C.red}}>{chores.filter(c=>!c.done).length}</span><span style={{fontSize:13,color:C.textLight}}> da fare</span></div>
            <button onClick={()=>setShowAddChore(true)} style={{...L.btn,padding:"8px 18px",fontSize:13}}>+ Aggiungi</button>
          </div>
          {chores.map(c=>(
            <div key={c.id} style={{...L.card,...L.row,opacity:c.done?0.45:1,transition:"opacity 0.2s"}} className="fade-up">
              <span style={{fontSize:22}}>{c.icon}</span>
              <div style={{flex:1,cursor:"pointer"}} onClick={()=>toggleChore(c.id)}>
                <div style={{fontSize:14,fontWeight:c.done?400:500,color:C.text,textDecoration:c.done?"line-through":"none"}}>{c.task}</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{c.day}</div>
              </div>
              <div onClick={()=>toggleChore(c.id)} style={{width:26,height:26,borderRadius:9,background:c.done?C.green:"transparent",border:`1.5px solid ${c.done?C.green:C.stone}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginRight:8,transition:"all 0.2s"}}>
                {c.done&&<span style={{color:"white",fontSize:13}}>✓</span>}
              </div>
              <button onClick={()=>delChore(c.id)} style={{background:"none",border:"none",color:C.textLight,fontSize:18,cursor:"pointer",padding:2}}>×</button>
            </div>
          ))}
          {chores.length===0&&<div style={{...L.cardWarm,textAlign:"center",padding:28,color:C.textMid,fontSize:14}}>Nessuna faccenda 🎉</div>}
          {showAddChore&&(
            <Modal onClose={()=>setShowAddChore(false)} title="Nuova faccenda">
              <input style={L.input} placeholder="Cosa devi fare?" value={newChore.task} onChange={e=>setNewChore({...newChore,task:e.target.value})}/>
              <select style={L.input} value={newChore.icon} onChange={e=>setNewChore({...newChore,icon:e.target.value})}>
                {["🧹","👕","👔","🚿","🛏️","🍽️","🪟","🗑️","🌿","🧺","🪣"].map(ic=><option key={ic} value={ic}>{ic}</option>)}
              </select>
              <select style={{...L.input,marginBottom:14}} value={newChore.day} onChange={e=>setNewChore({...newChore,day:e.target.value})}>
                {["Oggi","Domani","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"].map(d=><option key={d}>{d}</option>)}
              </select>
              <div style={{display:"flex",gap:10}}><button onClick={addChore} style={{...L.btn,flex:1}}>Aggiungi</button><button onClick={()=>setShowAddChore(false)} style={{...L.btnOut,flex:1}}>Annulla</button></div>
            </Modal>
          )}
        </>
      )}

      {tab==="menu"&&(
        <>
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {[1,2,3,4].map(w=>(
              <div key={w} onClick={()=>setWeekNum(w-1)} style={{flex:1,textAlign:"center",padding:"10px 4px",borderRadius:14,cursor:"pointer",background:weekNum===w-1?C.text:C.stone,color:weekNum===w-1?C.white:C.textMid,fontSize:13,fontWeight:500,transition:"all 0.2s"}}>
                Sett.{w}
              </div>
            ))}
          </div>
          {!grocAdded?(
            <button onClick={addMenuGroceries} style={{...L.btnOut,width:"100%",marginBottom:14,padding:"12px"}}>
              🛒 Aggiungi ingredienti alla spesa
            </button>
          ):(
            <div style={{...L.card,background:C.greenPale,border:`1px solid ${C.green}22`,...L.row,marginBottom:14}}>
              <span>✅</span><span style={{fontSize:13,color:C.green,fontWeight:500}}>Ingredienti aggiunti alla spesa</span>
            </div>
          )}
          {menu.map((m,i)=>{
            const isFri=m.d==="Ven";
            return(
              <div key={i} style={{...L.card,border:isFri?`1.5px solid ${C.peach}`:undefined,background:isFri?"#FFFAF5":undefined,marginBottom:10}}>
                <div style={{...L.row,justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:500,color:isFri?C.peach:C.textMid,textTransform:"uppercase",letterSpacing:1}}>{m.d}</span>
                  {isFri&&<span style={{fontSize:18}}>🥂</span>}
                </div>
                <div style={{fontSize:13,color:C.text,marginBottom:4}}>🌞 {m.p}</div>
                <div style={{fontSize:13,color:isFri?C.peach:C.textMid,fontWeight:isFri?500:400,fontStyle:isFri?"italic":"normal"}}>🌙 {m.c}</div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}
