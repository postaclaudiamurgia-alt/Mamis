  const [showAddFiglio,setShowAddFiglio]=useState(false);
  const [nuovoFiglio,setNuovoFiglio]=useState({nome:"",eta:""});
  const [settingOpen,setSettingOpen]=useState(null);
  const [lingua,setLingua]=useState("Italiano");
  const [tema,setTema]=useState("Chiaro");
  const [privacy,setPrivacy]=useState({profilo_pubblico:true,mostra_posizione:false,mostra_figli:true});

  const saveProfile=()=>{setSaved(true);setEditing(false);setTimeout(()=>setSaved(false),2500);};

  const requestGeo=()=>{
    if(!navigator.geolocation){setGeoStatus("denied");return;}
    navigator.geolocation.getCurrentPosition(
      ()=>{setGeoStatus("granted");setGeoConsent(true);},
      ()=>{setGeoStatus("denied");setGeoConsent(false);},
      {timeout:8000}
    );
  };

  const revokeGeo=()=>{setGeoConsent(false);setGeoStatus("idle");};

  const addFiglio=()=>{
    if(!nuovoFiglio.nome.trim())return;
    setProfile({...profile,figli:[...profile.figli,{...nuovoFiglio}]});
    setNuovoFiglio({nome:"",eta:""});setShowAddFiglio(false);
  };
  const removeFiglio=i=>setProfile({...profile,figli:profile.figli.filter((_,j)=>j!==i)});

  const tabs=[{id:"profilo",l:"Profilo"},{id:"impostazioni",l:"Impostazioni"},{id:"notifiche",l:"Notifiche"}];

  return(
    <div className="fade-up">
      <div style={{display:"flex",background:C.stone,borderRadius:14,padding:4,marginBottom:16,gap:4}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,border:"none",borderRadius:12,padding:"9px 4px",background:tab===t.id?C.white:"transparent",color:tab===t.id?C.text:C.textMid,fontSize:12,fontWeight:500,cursor:"pointer",transition:"all 0.2s",boxShadow:tab===t.id?"0 1px 6px rgba(0,0,0,0.08)":"none",whiteSpace:"nowrap"}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── PROFILO ── */}
      {tab==="profilo"&&(
        <>
          {/* Avatar card */}
          <div style={{...L.card,background:C.red,border:"none",padding:"24px 22px",textAlign:"center"}}>
            <div onClick={()=>setShowAvatarPicker(true)} style={{width:72,height:72,borderRadius:"50%",background:"rgba(255,255,255,0.2)",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,cursor:"pointer",border:"3px solid rgba(255,255,255,0.5)",position:"relative"}}>
              {avatar}
              <div style={{position:"absolute",bottom:-2,right:-2,width:22,height:22,borderRadius:"50%",background:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>✏️</div>
            </div>
            {!editing?(
              <>
                <div style={{fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:20,color:C.white}}>{profile.nome} {profile.cognome}</div>
                <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",marginTop:4}}>{profile.professione} · {profile.citta}</div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:4,lineHeight:1.5}}>{profile.bio}</div>
                {userType==="babysitter"&&<div style={{marginTop:10,background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"5px 14px",display:"inline-block",fontSize:12,color:C.white}}>✅ Baby Sitter verificata</div>}
                <button onClick={()=>setEditing(true)} style={{marginTop:14,background:"rgba(255,255,255,0.2)",color:C.white,border:"1.5px solid rgba(255,255,255,0.4)",borderRadius:12,padding:"8px 22px",fontSize:13,cursor:"pointer",fontWeight:500}}>
                  ✏️ Modifica profilo
                </button>
              </>
            ):(
              <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginBottom:4}}>Tocca la foto per cambiarla</div>
            )}
          </div>

          {/* AVATAR PICKER */}
          {showAvatarPicker&&(
            <Modal onClose={()=>setShowAvatarPicker(false)} title="Scegli il tuo avatar">
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
                {AVATARS.map(a=>(
                  <div key={a} onClick={()=>{setAvatar(a);setShowAvatarPicker(false);}} style={{width:"100%",aspectRatio:"1",borderRadius:14,background:avatar===a?C.red:C.stone,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,cursor:"pointer",transition:"all 0.15s",border:avatar===a?`2px solid ${C.red}`:"2px solid transparent"}}>
                    {a}
                  </div>
                ))}
              </div>
              <button onClick={()=>setShowAvatarPicker(false)} style={{...L.btnOut,width:"100%"}}>Annulla</button>
            </Modal>
          )}

          {/* EDIT FORM */}
          {editing&&(
            <div style={L.card} className="scale-in">
              <div style={{fontSize:11,fontWeight:500,color:C.textLight,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Dati personali</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:0}}>
                <input style={{...L.input,marginBottom:0}} placeholder="Nome" value={profile.nome} onChange={e=>setProfile({...profile,nome:e.target.value})}/>
                <input style={{...L.input,marginBottom:0}} placeholder="Cognome" value={profile.cognome} onChange={e=>setProfile({...profile,cognome:e.target.value})}/>
              </div>
              <div style={{marginTop:10}}/>
              <input style={L.input} placeholder="Email" type="email" value={profile.email} onChange={e=>setProfile({...profile,email:e.target.value})}/>
              <input style={L.input} placeholder="Telefono" type="tel" value={profile.telefono} onChange={e=>setProfile({...profile,telefono:e.target.value})}/>
              <input style={L.input} placeholder="Professione" value={profile.professione} onChange={e=>setProfile({...profile,professione:e.target.value})}/>
              <input style={L.input} placeholder="Città" value={profile.citta} onChange={e=>setProfile({...profile,citta:e.target.value})}/>
              <textarea style={{...L.input,height:80,resize:"none"}} placeholder="Una breve presentazione..." value={profile.bio} onChange={e=>setProfile({...profile,bio:e.target.value})}/>
              <div style={{display:"flex",gap:10,marginTop:4}}>
                <button onClick={saveProfile} style={{...L.btn,flex:1}}>✓ Salva</button>
                <button onClick={()=>setEditing(false)} style={{...L.btnOut,flex:1}}>Annulla</button>
              </div>
            </div>
          )}

          {saved&&(
            <div style={{...L.card,background:C.greenPale,border:`1px solid ${C.green}33`,...L.row,marginBottom:14}} className="scale-in">
              <span>✅</span><span style={{fontSize:13,color:C.green,fontWeight:500}}>Profilo salvato!</span>
            </div>
          )}

          {/* Figli */}
          <div style={L.secLabel}>I tuoi figli</div>
          {profile.figli.map((f,i)=>(
            <div key={i} style={{...L.card,...L.row,padding:"13px 18px"}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:C.redPale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👶</div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:C.text}}>{f.nome}</div>
                <div style={{fontSize:12,color:C.textLight}}>{f.eta} anni</div>
              </div>
              <button onClick={()=>removeFiglio(i)} style={{background:"none",border:"none",color:C.textLight,fontSize:18,cursor:"pointer"}}>×</button>
            </div>
          ))}
          <button onClick={()=>setShowAddFiglio(true)} style={{...L.btnOut,width:"100%",padding:"11px",marginBottom:4}}>+ Aggiungi figlio/a</button>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
            {[{l:"Impegni",v:"248"},{l:"Spesa",v:"52"},{l:"Amiche",v:"14"},{l:"Locali",v:"9"}].map((s,i)=>(
              <div key={i} style={{...L.cardWarm,textAlign:"center",marginBottom:0,padding:"14px 8px"}}>
                <div style={{fontFamily:"'Outfit',sans-serif",fontWeight:600,fontSize:24,color:C.red}}>{s.v}</div>
                <div style={{fontSize:11,color:C.textLight,marginTop:3,letterSpacing:1,textTransform:"uppercase"}}>{s.l}</div>
              </div>
            ))}
          </div>

          {showAddFiglio&&(
            <Modal onClose={()=>setShowAddFiglio(false)} title="Aggiungi figlio/a">
              <input style={L.input} placeholder="Nome" value={nuovoFiglio.nome} onChange={e=>setNuovoFiglio({...nuovoFiglio,nome:e.target.value})}/>
              <input style={L.input} placeholder="Età (anni)" type="number" value={nuovoFiglio.eta} onChange={e=>setNuovoFiglio({...nuovoFiglio,eta:e.target.value})}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={addFiglio} style={{...L.btn,flex:1}}>Aggiungi</button>
                <button onClick={()=>setShowAddFiglio(false)} style={{...L.btnOut,flex:1}}>Annulla</button>
              </div>
            </Modal>
          )}
        </>
      )}

      {/* ── IMPOSTAZIONI ── */}
      {tab==="impostazioni"&&(
        <>
          {/* GEOLOCALIZZAZIONE */}
          <div style={L.secLabel}>📍 Geolocalizzazione</div>
          <div style={L.card}>
            <div style={{fontSize:13,color:C.textMid,lineHeight:1.65,marginBottom:14}}>
              Mamis usa la tua posizione GPS per trovare locali baby friendly, baby sitter e mamme vicino a te. Puoi revocare il consenso in qualsiasi momento.
            </div>
            {geoStatus==="granted"?(
              <div>
                <div style={{...L.row,marginBottom:12,background:C.greenPale,borderRadius:12,padding:"10px 14px"}}>
                  <span style={{fontSize:18}}>✅</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.green}}>Posizione attiva</div>
                    <div style={{fontSize:11,color:C.green,opacity:0.8}}>La tua posizione è condivisa con Mamis</div>
                  </div>
                </div>
                <button onClick={revokeGeo} style={{...L.btnOut,width:"100%",padding:"11px",color:C.red,borderColor:C.red}}>
                  Revoca consenso geolocalizzazione
                </button>
              </div>
            ):geoStatus==="denied"?(
              <div>
                <div style={{...L.row,marginBottom:12,background:"#FFF0F0",borderRadius:12,padding:"10px 14px"}}>
                  <span style={{fontSize:18}}>⚠️</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.red}}>Accesso negato</div>
                    <div style={{fontSize:11,color:C.textLight}}>Abilita la posizione nelle impostazioni del telefono</div>
                  </div>
                </div>
                <button onClick={requestGeo} style={{...L.btn,width:"100%"}}>Riprova</button>
              </div>
            ):(
              <div>
                <div style={{...L.row,marginBottom:14,padding:"4px 0"}}>
                  <span style={{fontSize:16}}>📍</span>
                  <div style={{flex:1,fontSize:13,color:C.text}}>Consenti l'accesso alla posizione</div>
                  <div onClick={()=>requestGeo()} style={{width:50,height:28,borderRadius:14,cursor:"pointer",position:"relative",background:geoConsent?C.red:C.stone,transition:"background 0.25s",flexShrink:0}} >
                    <div style={{position:"absolute",top:4,left:geoConsent?26:4,width:20,height:20,borderRadius:"50%",background:C.white,transition:"left 0.25s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/>
                  </div>
                </div>
                <button onClick={requestGeo} style={{...L.btn,width:"100%"}}>
                  📍 Attiva geolocalizzazione
                </button>
              </div>
            )}
            <div style={{fontSize:11,color:C.textLight,marginTop:12,lineHeight:1.65,padding:"0 2px"}}>
              🔒 La tua posizione non viene mai venduta o condivisa con terzi. Viene usata solo all'interno di Mamis.
            </div>
          </div>

          {/* PRIVACY */}
          <div style={L.secLabel}>🔒 Privacy</div>
          <div style={L.card}>
            <Toggle on={privacy.profilo_pubblico} onChange={v=>setPrivacy({...privacy,profilo_pubblico:v})} label="Profilo visibile alla community" sub="Le altre mamme possono trovarti"/>
            <Toggle on={privacy.mostra_posizione} onChange={v=>setPrivacy({...privacy,mostra_posizione:v})} label="Mostra la tua città nel profilo" sub="Solo la città, non l'indirizzo"/>
            <Toggle on={privacy.mostra_figli} onChange={v=>setPrivacy({...privacy,mostra_figli:v})} label="Mostra i profili dei figli" sub="Nome ed età dei tuoi bambini"/>
          </div>

          {/* LINGUA */}
          <div style={L.secLabel}>🌍 Lingua e aspetto</div>
          <div style={L.card}>
            <div style={{...L.row,justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.stone}`}}>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:C.text}}>Lingua</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>Lingua dell'interfaccia</div>
              </div>
              <select value={lingua} onChange={e=>setLingua(e.target.value)} style={{...L.input,marginBottom:0,width:"auto",fontSize:13,padding:"6px 12px",borderRadius:10}}>
                {["Italiano","English","Français","Deutsch","Español"].map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div style={{...L.row,justifyContent:"space-between",padding:"12px 0"}}>
              <div>
                <div style={{fontSize:14,fontWeight:500,color:C.text}}>Tema</div>
                <div style={{fontSize:12,color:C.textLight,marginTop:2}}>Aspetto dell'app</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {["Chiaro","Scuro"].map(t=>(
                  <div key={t} onClick={()=>setTema(t)} style={{...L.pill,cursor:"pointer",background:tema===t?C.text:C.stone,color:tema===t?C.white:C.textMid,transition:"all 0.15s"}}>{t}</div>
                ))}
              </div>
            </div>
          </div>

          {/* ACCOUNT */}
          <div style={L.secLabel}>⚙️ Account</div>
          {[
            {i:"💎",l:"Mamis Premium",s:"Sblocca tutte le funzionalità"},
            {i:"📤",l:"Esporta i miei dati",s:"Scarica una copia dei tuoi dati"},
            {i:"🗑️",l:"Elimina account",s:"Rimuovi permanentemente il tuo profilo"},
            {i:"❓",l:"Supporto e FAQ",s:"Hai bisogno di aiuto?"},
          ].map((item,i)=>(
            <div key={i} style={{...L.card,...L.row,padding:"14px 18px",cursor:"pointer",marginBottom:8}}>
              <span style={{fontSize:20}}>{item.i}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:C.text,fontWeight:400}}>{item.l}</div>
                <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{item.s}</div>
              </div>
              <span style={{color:C.textLight,fontSize:18}}>›</span>
            </div>
          ))}
        </>
      )}

      {/* ── NOTIFICHE ── */}
      {tab==="notifiche"&&(
        <>
          <div style={{...L.cardWarm,padding:"14px 18px",marginBottom:14}}>
            <div style={{fontSize:13,color:C.textMid,lineHeight:1.65}}>Gestisci le notifiche Mamis. Ogni tipo è personalizzabile.</div>
          </div>
          <div style={L.card}>
            <Toggle on={notifSettings.agenda} onChange={v=>setNotifSettings({...notifSettings,agenda:v})} label="📅 Promemoria impegni" sub="30 minuti prima di ogni evento"/>
            <Toggle on={notifSettings.social} onChange={v=>setNotifSettings({...notifSettings,social:v})} label="💬 Notifiche social" sub="Like, commenti e nuovi post"/>
            <Toggle on={notifSettings.babysitter} onChange={v=>setNotifSettings({...notifSettings,babysitter:v})} label="👶 Baby sitter" sub="Nuove baby sitter vicino a te"/>
            <Toggle on={notifSettings.spesa} onChange={v=>setNotifSettings({...notifSettings,spesa:v})} label="🛒 Lista della spesa" sub="Promemoria articoli non acquistati"/>
            <Toggle on={notifSettings.menu} onChange={v=>setNotifSettings({...notifSettings,menu:v})} label="🍽️ Menù del giorno" sub="Suggerimento pranzo e cena"/>
            <Toggle on={notifSettings.venerdi} onChange={v=>setNotifSettings({...notifSettings,venerdi:v})} label="🥂 SPRITZ Time!" sub="Ogni venerdì sera"/>
            <Toggle on={notifSettings.luoghi} onChange={v=>setNotifSettings({...notifSettings,luoghi:v})} label="📍 Nuovi luoghi" sub="Locali baby friendly vicino a te"/>
            <Toggle on={notifSettings.tuttoOff} onChange={v=>setNotifSettings({...notifSettings,tuttoOff:v,agenda:!v,social:!v,babysitter:!v,spesa:!v,menu:!v,venerdi:!v,luoghi:!v})} label="🔕 Silenzio totale" sub="Disattiva tutto"/>
          </div>
        </>
      )}
    </div>
  );
}

// ── NOTIFICATION BANNER ───────────────────────────────────────────────────────
function NotifBanner({notifs,onDismiss}){
  if(!notifs.length)return null;
  return(
    <div style={{position:"absolute",top:0,left:0,right:0,zIndex:300,padding:"8px 14px",pointerEvents:"none"}}>
      {notifs.map(n=>(
        <div key={n.id} className="slide-up" style={{...L.card,marginBottom:6,...L.row,padding:"12px 16px",boxShadow:"0 4px 24px rgba(0,0,0,0.14)",pointerEvents:"all",border:`1px solid ${C.stone}`}}>
          <span style={{fontSize:22}}>{n.icon}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.text}}>{n.title}</div><div style={{fontSize:12,color:C.textMid}}>{n.body}</div></div>
          <button onClick={()=>onDismiss(n.id)} style={{background:"none",border:"none",color:C.textLight,fontSize:20,cursor:"pointer",pointerEvents:"all"}}>×</button>
        </div>
      ))}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const NAV=[
  {id:"home",icon:"⊙",label:"Home"},
  {id:"agenda",icon:"◻",label:"Agenda"},
  {id:"social",icon:"◯",label:"Social"},
  {id:"luoghi",icon:"◈",label:"Luoghi"},
  {id:"babysitter",icon:"◇",label:"Baby Sitter"},
  {id:"casa",icon:"⊞",label:"Casa"},
  {id:"profilo",icon:"◉",label:"Profilo"},
];

function MamisApp(){
  const now=useClock();
  const [screen,setScreen]=useState("home");
  const [events,setEvents]=useState(initEvents);
  const [posts,setPosts]=useState(initPosts);
  const [shopping,setShopping]=useState(initShopping);
  const [chores,setChores]=useState(initChores);
  const [userType,setUserType]=useState("mamma");
  const [groups,setGroups]=useState([]);
  const [notifSettings,setNotifSettings]=useState({agenda:true,social:true,babysitter:true,spesa:false,menu:false,venerdi:true,luoghi:false,tuttoOff:false});
  const [notifs,setNotifs]=useState([]);
  const dismissNotif=id=>setNotifs(p=>p.filter(n=>n.id!==id));

  useEffect(()=>{
    if(notifs.length>0){const t=setTimeout(()=>setNotifs(p=>p.slice(1)),5000);return()=>clearTimeout(t);}
  },[notifs.length]);

  const screenTitles={home:null,agenda:"Agenda",social:"Community",luoghi:"Luoghi",babysitter:"Baby Sitter",casa:"Casa",profilo:"Profilo"};
  const h=now.getHours();

  return(
    <div style={L.app}>
      <NotifBanner notifs={notifs} onDismiss={dismissNotif}/>

      {/* HEADER */}
      <div style={L.header}>
        <div style={{...L.row,justifyContent:"space-between"}}>
          <div style={L.row}>
            <LogoIcon size={48}/>
            <div style={{marginLeft:4}}>
              {screen==="home"?(
                <>
                  <div style={{fontSize:36,fontWeight:600,color:C.white,letterSpacing:3,fontFamily:"'Outfit',sans-serif",lineHeight:1}}>Mamis</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.65)",letterSpacing:4,textTransform:"uppercase",marginTop:3,fontWeight:300}}>la tua alleata</div>
                </>
              ):(
                <>
                  <div style={{fontSize:22,fontWeight:600,color:C.white,letterSpacing:3,fontFamily:"'Outfit',sans-serif",lineHeight:1}}>Mamis</div>
                  <div style={{fontSize:13,fontWeight:300,color:"rgba(255,255,255,0.85)",marginTop:2,letterSpacing:1}}>{screenTitles[screen]}</div>
                </>
              )}
            </div>
          </div>
          <button onClick={()=>setNotifs(p=>[...p,{id:uid(),icon:"🔔",title:"Test",body:"Notifiche attive! 🌸"}])} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",position:"relative",color:C.white,fontSize:16}}>
            🔔
            {notifs.length>0&&<span style={{position:"absolute",top:-2,right:-2,background:C.white,color:C.red,borderRadius:"50%",width:16,height:16,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{notifs.length}</span>}
          </button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={L.scroll}>
        {screen==="home"&&<HomeScreen events={events} shopping={shopping} chores={chores} now={now} userType={userType}/>}
        {screen==="agenda"&&<AgendaScreen events={events} setEvents={setEvents} groups={groups} setScreen={setScreen}/>}
        {screen==="social"&&<SocialScreen posts={posts} setPosts={setPosts} events={events} groups={groups} setGroups={setGroups}/>}
        {screen==="luoghi"&&<PlacesScreen/>}
        {screen==="babysitter"&&<BabySitterScreen userType={userType} setUserType={setUserType}/>}
        {screen==="casa"&&<CasaScreen shopping={shopping} setShopping={setShopping} chores={chores} setChores={setChores}/>}
        {screen==="profilo"&&<ProfileScreen notifSettings={notifSettings} setNotifSettings={setNotifSettings} userType={userType}/>}
      </div>

      {/* NAV */}
      <nav style={L.nav}>
        {NAV.map(item=>(
          <button key={item.id} onClick={()=>setScreen(item.id)} style={{...L.navBtn,background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 2px",borderRadius:10,transition:"all 0.18s",minWidth:40,touchAction:"manipulation"}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:screen===item.id?C.red:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
              {item.id==="home"&&<LogoIcon size={22}/>}
              {item.id!=="home"&&<span style={{fontSize:screen===item.id?15:14,color:screen===item.id?C.white:C.textLight}}>{item.icon}</span>}
            </div>
            <span style={{fontSize:9,fontWeight:screen===item.id?500:400,color:screen===item.id?C.red:C.textLight,letterSpacing:0.3,textTransform:"uppercase",whiteSpace:"nowrap"}}>{item.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MamisApp/>);
</script>
</body>
</html>
